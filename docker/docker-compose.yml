version: '3.8'

# eda-lab 전용 Kafka 클러스터
# 기존 kafka-pipeline-lab 클러스터(19092/29092/39092)와 완전 격리

services:
  eda-kafka-1:
    image: confluentinc/cp-kafka:7.5.1
    container_name: eda-kafka-1
    hostname: eda-kafka-1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@eda-kafka-1:29093,2@eda-kafka-2:29093,3@eda-kafka-3:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://eda-kafka-1:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: 'GGQnvdlPSFKRquMq-daC5w'
    volumes:
      - eda-kafka-1-data:/var/lib/kafka/data
    networks:
      - eda-network

  eda-kafka-2:
    image: confluentinc/cp-kafka:7.5.1
    container_name: eda-kafka-2
    hostname: eda-kafka-2
    ports:
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@eda-kafka-1:29093,2@eda-kafka-2:29093,3@eda-kafka-3:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://eda-kafka-2:29092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: 'GGQnvdlPSFKRquMq-daC5w'
    volumes:
      - eda-kafka-2-data:/var/lib/kafka/data
    networks:
      - eda-network

  eda-kafka-3:
    image: confluentinc/cp-kafka:7.5.1
    container_name: eda-kafka-3
    hostname: eda-kafka-3
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@eda-kafka-1:29093,2@eda-kafka-2:29093,3@eda-kafka-3:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://eda-kafka-3:29092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: 'GGQnvdlPSFKRquMq-daC5w'
    volumes:
      - eda-kafka-3-data:/var/lib/kafka/data
    networks:
      - eda-network

  eda-kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: eda-kafka-ui
    ports:
      - "8888:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: eda-lab
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: eda-kafka-1:29092,eda-kafka-2:29092,eda-kafka-3:29092
    depends_on:
      - eda-kafka-1
      - eda-kafka-2
      - eda-kafka-3
    networks:
      - eda-network

volumes:
  eda-kafka-1-data:
  eda-kafka-2-data:
  eda-kafka-3-data:

networks:
  eda-network:
    driver: bridge
